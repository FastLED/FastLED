## IDF Component Manager dependencies for FastLED
## Used by PlatformIO (pioarduino) to pull ESP-IDF components during build.
dependencies:
  espressif/esp_h264:
    version: "^1.2.0"
    rules:
      - if: "target == esp32p4"
  espressif/mdns:
    version: "^1.2.0"
    rules:
      - if: "idf_version < 6.0.0 && target not in [esp32h2, esp32p4]"

# Re-include src/fl/build/ which DEFAULT_EXCLUDE's **/build/**/* otherwise strips.
files:
  include:
    - "src/fl/build/**/*"
