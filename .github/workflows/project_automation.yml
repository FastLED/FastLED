name: project-automation

on:
  issues:
    types: [opened, closed, reopened]
  # NOTE: pull_request_target trigger removed per #2757 ("ban pull_request_target").
  # Project-board sync for PRs no longer auto-fires. If PR-side automation is
  # needed in the future, use a less risky trigger (e.g. workflow_dispatch with
  # a maintainer-provided PR number, or a webhook from a trusted middleware).
  # pull_request_target was the only trigger here capable of running with the
  # PROJECT_APP_PRIVATE_KEY secret on fork PRs, which is now disallowed.

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    if: >-
      vars.PROJECT_APP_CLIENT_ID != '' &&
      vars.PROJECT_NUMBER != '' &&
      vars.PROJECT_OWNER != ''
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PROJECT_APP_CLIENT_ID }}
          private-key: ${{ secrets.PROJECT_APP_PRIVATE_KEY }}
          owner: ${{ vars.PROJECT_OWNER }}

      - name: Sync to project board
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PROJECT_OWNER: ${{ vars.PROJECT_OWNER }}
          PROJECT_OWNER_TYPE: ${{ vars.PROJECT_OWNER_TYPE || 'organization' }}
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
          STATUS_FIELD: ${{ vars.PROJECT_STATUS_FIELD_NAME || 'Status' }}
          STATUS_TODO: ${{ vars.PROJECT_STATUS_TODO || 'Triage' }}
          STATUS_DONE: ${{ vars.PROJECT_STATUS_DONE || 'Done' }}
          STATUS_DRAFT: ${{ vars.PROJECT_STATUS_DRAFT || 'In Progress' }}
          DATE_FIELD: ${{ vars.PROJECT_DATE_FIELD_NAME || 'Date posted' }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ITEM_NODE_ID: ${{ github.event.issue.node_id || github.event.pull_request.node_id }}
          IS_DRAFT: ${{ github.event.pull_request.draft || 'false' }}
        run: python ci/github_project_sync.py
