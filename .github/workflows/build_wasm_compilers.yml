name: wasm_compile_test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
    push:
      branches:
        - master
      paths:
        - 'src/**'
        - 'examples/wasm/**'
        - 'examples/WasmScreenCoords/**'
        - 'ci/**'
        - '.github/workflows/build_wasm_compilers.yml'
        - 'CMakeLists.txt'
        - 'platformio.ini'
        - 'library.json'
        - 'library.properties'
permissions:
  contents: read        # Required to checkout code
  actions: read         # Required for artifact operations  
  id-token: write      # Required for artifact upload (OIDC)
  pull-requests: read   # If needed to read PR info

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install UV and clang-tool-chain
      run: pip install uv clang-tool-chain --upgrade

    - name: Verify clang-tool-chain installation
      run: |
        which clang-tool-chain-emcc || (echo "clang-tool-chain-emcc not found in PATH" && exit 1)
        clang-tool-chain-emcc --version

    - name: Compile WASM example using native toolchain
      run: uv run ci/wasm_compile.py examples/wasm

    - name: Install Playwright
      run: |
        uv pip install playwright
        uv run python -m playwright install chromium

    - name: Run Playwright tests
      run: uv run ci/wasm_test.py wasm

    - name: Generate timestamp and random hex
      id: generate_id
      run: |
        echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
        echo "random_hex=$(openssl rand -hex 3)" >> $GITHUB_OUTPUT

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wasm-artifacts-${{ steps.generate_id.outputs.timestamp }}-${{ github.sha }}-${{ steps.generate_id.outputs.random_hex }}
        path: examples/wasm/fastled_js/*
