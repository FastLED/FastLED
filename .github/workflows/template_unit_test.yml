name: unit tests template

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'Runner OS (ubuntu-latest, macos-latest, or windows-latest)'

permissions:
  contents: read        # Required to checkout code
  actions: read         # Required for artifact operations
  id-token: write      # Required for artifact upload (OIDC)
  pull-requests: read   # If needed to read PR info

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"
          version: "0.8.0" # 0.8.8 has problems with deployment on linux.

      - name: Install libunwind-dev (Linux only)
        if: runner.os == 'Linux'
        # Refresh apt indexes before install so stale mirror metadata
        # (e.g. a transitional liblzma-dev version the mirror hasn't
        # propagated yet, returning 404) doesn't fail the build.
        run: |
          sudo apt-get update
          sudo apt-get install -y libunwind-dev

      - name: Install
        run: ./install
        shell: bash

      - name: No namespace after headers
        run: |
          uv run python ci/lint_cpp/no_using_namespace_fl_in_headers.py

      - name: Reset zccache daemon (Windows flake mitigation, FastLED#2805)
        if: runner.os == 'Windows'
        run: |
          # The zccache daemon's named-pipe IPC drops mid-link under heavy
          # parallel link load on Windows hosted runners — the daemon's own
          # diagnostic emits 'lost connection to daemon ... try `zccache stop`'.
          # Start each Windows job with a known-clean daemon state so the
          # first wave of test-DLL links doesn't race a stale/partially-
          # initialized daemon. `|| true` because there may be no daemon to
          # stop on a fresh runner — that's the desired end state anyway.
          zccache stop || true
        shell: bash

      - name: Run All Unit Tests
        id: run_tests
        run: |
          set -o pipefail
          ./test --clang --no-parallel --unit --verbose --debug --log-failures failures 2>&1 | tee test.log
        shell: bash

      - name: Test summary and failure logs
        if: always()
        run: |
          echo "############################################"
          echo "Last 100 lines of test.log (most recent output)"
          echo "############################################"
          tail -n 100 test.log || true

          echo ""
          echo "############################################"
          echo "Failure logs (if any)"
          echo "############################################"
          fail_dir="failures"
          if [ -d "$fail_dir" ] && ls "$fail_dir"/*.log >/dev/null 2>&1; then
            # Failures exist - print them and exit with error
            for f in "$fail_dir"/*.log; do
              echo "----------------------"
              echo "$(basename "$f")"
              echo "----------------------"
              # Print the failure log content
              cat "$f"
              echo ""
            done
            echo "TESTS FAILED: See failure logs above"
            exit 1
          else
            echo "ALL UNIT TESTS PASSED"
          fi
        shell: bash
