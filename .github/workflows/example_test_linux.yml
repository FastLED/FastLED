name: example tests linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - 'examples/**'
      - 'ci/**'
      - '.github/workflows/example_test*.yml'
      - '.github/workflows/template_example_test.yml'
      - 'CMakeLists.txt'
      - 'meson.build'
      - 'examples/meson.build'
      - 'pyproject.toml'
      - 'test'
      - 'test.py'
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - 'examples/**'
      - 'ci/**'
      - '.github/workflows/example_test*.yml'
      - '.github/workflows/template_example_test.yml'
      - 'CMakeLists.txt'
      - 'meson.build'
      - 'examples/meson.build'
      - 'pyproject.toml'
      - 'test'
      - 'test.py'

jobs:
  test:
    # Hard-block external-fork pull requests (no exceptions per #2757).
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/template_example_test.yml
    with:
      os: ubuntu-latest
