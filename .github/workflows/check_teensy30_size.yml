name: check_teensy30_size

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '!src/platforms/esp/**'
      - '!src/platforms/wasm/**'
      - '!src/platforms/avr/**'
      - '!src/platforms/arm/rp2040/**'
      - '!src/platforms/arm/sam/**'
      - 'src/platforms/arm/k20/**'
      - 'src/platforms/arm/k66/**'
      - 'src/platforms/arm/kl26/**'
      - 'src/platforms/arm/mxrt1062/**'
      - 'examples/**'
      - 'ci/**'
      - '.github/workflows/check_teensy30_size.yml'
      - '.github/workflows/build_template.yml'
      - 'CMakeLists.txt'
      - 'platformio.ini'
      - 'library.json'
      - 'library.properties'
jobs:
  build:
    uses: ./.github/workflows/build_template_binary_size.yml
    with:
      board: teensy30
      # FROZEN SIZE THRESHOLD — DO NOT RAISE TO MAKE CI GREEN.
      # Mirror-locked by ci/lint/check_size_thresholds.py. Raising a value
      # here without updating the frozen-list constant in that script will
      # fail `bash lint`. Fix the regression instead.
      max_size: 60000
      max_size_apa102: 50000
