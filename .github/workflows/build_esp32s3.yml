name: esp32s3

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '!src/platforms/arm/**'
      - '!src/platforms/wasm/**'
      - '!src/platforms/avr/**'
      - 'src/platforms/esp/**'
      - 'examples/**'
      - 'ci/**'
      - '.github/workflows/build_esp32s3.yml'
      - '.github/workflows/build_template.yml'
      - 'CMakeLists.txt'
      - 'platformio.ini'
      - 'library.json'
      - 'library.properties'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
      - '!src/platforms/arm/**'
      - '!src/platforms/wasm/**'
      - '!src/platforms/avr/**'
      - 'src/platforms/esp/**'
      - 'examples/**'
      - 'ci/**'
      - '.github/workflows/build_esp32s3.yml'
      - '.github/workflows/build_template.yml'
      - 'CMakeLists.txt'
      - 'platformio.ini'
      - 'library.json'
      - 'library.properties'
      - 'pyproject.toml'
      - 'uv.lock'

jobs:
  build:
    # Hard-block external-fork pull requests (no exceptions per #2757).
    # `github.event.pull_request == null` lets push / workflow_dispatch / etc.
    # pass; the equality clause only matches when the PR head repo IS the base.
    if: github.event.pull_request == null || github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/build_template.yml
    with:
      args: esp32s3 all
