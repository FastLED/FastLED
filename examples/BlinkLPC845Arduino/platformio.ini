[platformio]
default_envs = lpc845brk

[env]
# pinning the platform to my fork for now until the PR is merged, but this can be removed once that happens
#platform = https://github.com/phatpaul/platform-nxplpc-arduino.git
# Using local development copies - switch to GitHub URLs for production/CI
platform = symlink:///home/pabbott/repos/platform-nxplpc-arduino
# pinning the framework to my fork for now until the PR is merged, but this can be removed once that happens
#platform_packages = framework-arduino-lpc8xx @ https://github.com/phatpaul/ArduinoCore-LPC8xx.git
# Using local development copies - switch to GitHub URLs for production/CI
platform_packages = framework-arduino-lpc8xx @ symlink:///home/pabbott/repos/ArduinoCore-LPC8xx

framework = arduino
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
lib_extra_dirs = ../..
lib_deps = fastled=symlink://../../

[env:lpc845brk]
board = lpc845brk
board_build.ldscript = lpc845_flash.ld
upload_protocol = cmsis-dap
debug_tool = cmsis-dap
debug_init_break = tbreak setup
build_type = debug
build_flags =
    -I${platformio.packages_dir}/framework-arduino-lpc8xx/variants/lpc845brk
    -I${platformio.packages_dir}/framework-arduino-lpc8xx/variants/lpc845
    -I${platformio.packages_dir}/framework-arduino-lpc8xx/CMSIS
    -std=gnu++14
    -DFASTLED_ALL_PINS_VALID
    -DFASTLED_M0_USE_C_IMPLEMENTATION
    -Og
    -g3
build_unflags = -std=gnu++11

[env:lpcxpresso804]
board = lpcxpresso804
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc804_flash.ld

[env:lpcxpresso845max]
board = lpcxpresso845max
board_build.ldscript = ${platformio.packages_dir}/framework-arduino-lpc8xx/linker_scripts/gcc/lpc845_flash.ld
